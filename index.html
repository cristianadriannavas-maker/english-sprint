<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>English Sprint</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#101820;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

header{
padding:25px;
text-align:center;
background:#1565C0;
}

header h1{
font-size:38px;
}

header p{
margin-top:10px;
opacity:.85;
}

.menu{
padding:20px;
display:flex;
flex-direction:column;
gap:15px;
}

button{

width:100%;
height:70px;

border:none;
border-radius:15px;

background:#1F6FEB;
color:white;

font-size:22px;

cursor:pointer;

}

button:active{

transform:scale(.98);

}

#contenido{

padding:20px;

}

.card{

background:#1d2935;

padding:18px;

margin-bottom:15px;

border-radius:15px;

}

.card h2{

font-size:22px;

margin-bottom:10px;

}

.card p{

opacity:.8;

margin:4px 0;

}

.oculto{

display:none;

}

</style>

</head>

<body>

<header>

<h1>🇺🇸 English Sprint</h1>

<p>Aprende inglés con videos reales</p>

</header>

<div class="menu">

<button onclick="mostrarBiblioteca()">
📚 Biblioteca
</button>

<button>
➕ Agregar Video
</button>

<button>
🧠 Flashcards
</button>

<button>
🎧 Listening
</button>

<button>
📊 Estadísticas
</button>

</div>

<div id="contenido"></div>

<script src="js/app.js"></script>

</body>

</html>
